      - name: recovery_rate
        role: measure
        description: "回收率，已回收金额除以逾期金额，百分比。"
        alias: ["回收率","催收回收率","回款率"]
        sync: false

metrics:
  - name: 新增客户数
    description: "统计指定时间段内新开户的客户总数，反映业务拓展能力。"
    relevant_columns: ["customer.id","customer.opened_at","customer.customer_type","customer.branch_id"]
    alias: ["新开户数","新注册客户","开户客户数"]

  - name: 活跃客户数
    description: "统计指定时间段内有交易行为的不重复客户数。"
    relevant_columns: ["customer.id","account_transaction.customer_id","account_transaction.transaction_at"]
    alias: ["活跃用户数","有交易客户数"]

  - name: 客户风险等级分布
    description: "按风险等级统计客户数量分布，反映客户群体整体风险状况。"
    relevant_columns: ["customer.id","customer.risk_level_id","dim_risk_level.risk_level_name"]
    alias: ["风险等级分布","客户风险分布"]

  - name: KYC完成率
    description: "统计KYC认证状态为approved的客户数占总客户数的比例。"
    relevant_columns: ["customer_kyc.customer_id","customer_kyc.kyc_status"]
    alias: ["KYC通过率","实名认证率"]

  - name: 正常账户数
    description: "统计当前账户状态为active（正常）的银行账户总数。"
    relevant_columns: ["bank_account.id","bank_account.account_status"]
    alias: ["活跃账户数","有效账户数","正常户数"]

  - name: 账户余额总额
    description: "统计所有正常账户的可用余额总和，反映存款规模。"
    relevant_columns: ["bank_account.available_amount","bank_account.account_status"]
    alias: ["总余额","存款总额","账户总余额"]

  - name: 交易金额
    description: "统计指定时间段内所有成功交易的金额总和，不含失败和冲正交易。"
    relevant_columns: ["account_transaction.transaction_amount","account_transaction.transaction_status","account_transaction.transaction_at"]
    alias: ["交易总额","成交金额","总交易额"]

  - name: 交易笔数
    description: "统计指定时间段内所有成功交易的总笔数。"
    relevant_columns: ["account_transaction.id","account_transaction.transaction_status","account_transaction.transaction_at"]
    alias: ["交易数量","交易次数","成交笔数"]

  - name: 失败交易笔数
    description: "统计指定时间段内交易状态为failed的交易总笔数，反映交易异常情况。"
    relevant_columns: ["account_transaction.id","account_transaction.transaction_status","account_transaction.transaction_at"]
    alias: ["失败交易数","交易失败数"]

  - name: 理财持仓规模
    description: "统计当前持仓状态为holding的理财持仓市值总和，即AUM。"
    relevant_columns: ["wealth_position.market_value_amount","wealth_position.position_status"]
    alias: ["理财AUM","理财规模","资产管理规模","持仓规模","理财余额"]

  - name: 理财订单金额
    description: "统计指定时间段内理财申购订单的总金额（仅统计confirmed已确认状态）。"
    relevant_columns: ["wealth_order.order_amount","wealth_order.order_type","wealth_order.order_status","wealth_order.submitted_at"]
    alias: ["理财申购金额","申购金额","理财申购额"]

  - name: 贷款申请数
    description: "统计指定时间段内提交的贷款申请总笔数。"
    relevant_columns: ["loan_application.id","loan_application.submitted_at"]
    alias: ["贷款申请笔数","申请笔数","贷款申请量"]

  - name: 审批通过率
    description: "统计贷款审批结果为approved的笔数占总审批笔数的比例。"
    relevant_columns: ["loan_approval_record.approval_result","loan_approval_record.approved_at"]
    alias: ["贷款通过率","审批通过比例","批贷率"]

  - name: 放款金额
    description: "统计指定时间段内放款成功的总金额，单位元。"
    relevant_columns: ["loan_disbursement.disbursement_amount","loan_disbursement.disbursement_status","loan_disbursement.disbursed_at"]
    alias: ["放款总额","贷款发放金额","发放金额"]

  - name: 贷款余额
    description: "统计当前状态为active（还款中）的所有贷款合同的贷款余额总和。"
    relevant_columns: ["loan_contract.outstanding_principal_amount","loan_contract.contract_status"]
    alias: ["贷款总余额","未还贷款余额","贷款未还金额","贷款规模"]

  - name: 还款金额
    description: "统计指定时间段内还款成功的总金额，单位元。"
    relevant_columns: ["repayment_record.repayment_amount","repayment_record.repayment_status","repayment_record.repaid_at"]
    alias: ["还款总额","实际还款金额","回款金额"]

  - name: 逾期余额
    description: "统计当前逾期状态为ongoing的所有逾期记录的逾期本金余额总和，单位元。"
    relevant_columns: ["overdue_record.overdue_principal_amount","overdue_record.overdue_status"]
    alias: ["逾期金额","在逾期余额","逾期贷款余额","逾期本金"]

  - name: 逾期合同数
    description: "统计当前合同状态为overdue或存在ongoing逾期记录的合同总数。"
    relevant_columns: ["loan_contract.id","loan_contract.contract_status","overdue_record.contract_id"]
    alias: ["逾期贷款数","逾期笔数","逾期合同数量"]

  - name: 风险事件数
    description: "统计指定时间段内产生的风险事件总数，包含各类风险类型。"
    relevant_columns: ["risk_event.id","risk_event.created_at","risk_event.event_type"]
    alias: ["风险事件总数","风险预警数","风控事件数"]

  - name: 规则命中数
    description: "统计指定时间段内风控规则被触发并命中的总次数。"
    relevant_columns: ["risk_hit_record.id","risk_hit_record.created_at","risk_hit_record.decision_action"]
    alias: ["规则触发数","风控命中次数"]

  - name: 催收回收率
    description: "统计催收绩效日统计中的回收率，反映催收效果。"
    relevant_columns: ["collection_performance_daily.recovered_amount","collection_performance_daily.recovery_rate","collection_performance_daily.assigned_amount"]
    alias: ["回款率","催收回款率","回收比率"]

  - name: 催收案件数
    description: "统计指定时间段内新建的催收案件总数。"
    relevant_columns: ["collection_case.id","collection_case.created_at","collection_case.case_status"]
    alias: ["催收案件总数","在催案件数"]

  - name: 黑名单记录数
    description: "统计当前生效中的黑名单记录总数。"
    relevant_columns: ["blacklist_record.id","blacklist_record.blacklist_status"]
    alias: ["黑名单数量","黑名单客户数"]

  - name: 新增账户数
    description: "统计指定时间段内新开的银行账户总数。"
    relevant_columns: ["bank_account.id","bank_account.opened_at","bank_account.branch_id"]
    alias: ["新开户数","新开账户数","开户账户数"]

  - name: 个人客户数
    description: "统计当前客户类型为personal的个人客户总数。"
    relevant_columns: ["customer.id","customer.customer_type","customer.customer_status"]
    alias: ["个人用户数","个人客户总量"]

  - name: 企业客户数
    description: "统计当前客户类型为enterprise的企业客户总数。"
    relevant_columns: ["customer.id","customer.customer_type","enterprise_profile.customer_id"]
    alias: ["企业用户数","对公客户数","公司客户数"]

  - name: 冻结金额总额
    description: "统计当前所有正常账户的冻结金额总和，单位元。"
    relevant_columns: ["bank_account.frozen_amount","bank_account.account_status","fund_freeze.freeze_amount","fund_freeze.freeze_status"]
    alias: ["总冻结金额","账户冻结总额","冻结资金"]

  - name: 渠道交易金额
    description: "统计指定时间段内各渠道成功交易的金额总和，单位元。"
    relevant_columns: ["channel_transaction.channel_amount","channel_transaction.request_status","channel_transaction.channel_id","channel_transaction.requested_at","dim_channel.channel_name"]
    alias: ["渠道成交额","渠道交易总额","各渠道交易金额"]

  - name: 理财产品数量
    description: "统计当前在售状态的理财产品总数。"
    relevant_columns: ["wealth_product.id","wealth_product.product_status"]
    alias: ["在售理财产品数","理财产品总数"]

  - name: 理财持仓数
    description: "统计当前持仓状态为holding的理财持仓记录总数。"
    relevant_columns: ["wealth_position.id","wealth_position.position_status"]
    alias: ["持仓笔数","持有理财数","持仓数量"]

  - name: 理财赎回金额
    description: "统计指定时间段内理财赎回订单的总金额（仅统计confirmed已确认状态）。"
    relevant_columns: ["wealth_order.order_amount","wealth_order.order_type","wealth_order.order_status","wealth_order.submitted_at"]
    alias: ["赎回金额","理财赎回额","赎回总额"]

  - name: 理财收益
    description: "统计指定时间段内客户理财收益总额，单位元。"
    relevant_columns: ["wealth_income.income_amount","wealth_income.income_date","wealth_income.income_type"]
    alias: ["理财收益总额","收益金额","客户理财收益"]

  - name: 授信申请数
    description: "统计指定时间段内提交的授信申请总笔数。"
    relevant_columns: ["credit_application.id","credit_application.submitted_at","credit_application.application_status"]
    alias: ["授信申请笔数","授信申请量"]

  - name: 授信额度
    description: "统计当前有效授信额度的总和，单位元。"
    relevant_columns: ["credit_limit.total_limit_amount","credit_limit.limit_status","credit_limit.available_limit_amount"]
    alias: ["授信总额","有效授信额度","总授信额度"]

  - name: 有效贷款合同数
    description: "统计当前合同状态为active（还款中）的贷款合同总数。"
    relevant_columns: ["loan_contract.id","loan_contract.contract_status"]
    alias: ["在贷合同数","有效合同数","还款中合同数"]

  - name: 提前还款金额
    description: "统计指定时间段内提前还款（部分或全额）的成功还款总金额，单位元。"
    relevant_columns: ["repayment_record.repayment_amount","repayment_record.repayment_type","repayment_record.repayment_status","repayment_record.repaid_at"]
    alias: ["提前还款总额","提前还本金额","提前结清金额"]

  - name: 费用减免金额
    description: "统计指定时间段内批准的费用减免总金额，单位元。"
    relevant_columns: ["fee_reduction.approved_amount","fee_reduction.reduction_status","fee_reduction.approved_at"]
    alias: ["减免总额","费用减免总额","利息减免金额"]

  - name: 逾期阶段分布
    description: "按逾期阶段（M1/M2/M3/M4+）统计逾期本金余额分布。"
    relevant_columns: ["overdue_record.overdue_level","overdue_record.overdue_principal_amount","overdue_record.overdue_status"]
    alias: ["逾期分期分布","逾期分类分布","各逾期阶段金额"]

  - name: 人工复核任务数
    description: "统计指定时间段内创建的人工复核任务总数。"
    relevant_columns: ["manual_review_task.id","manual_review_task.task_status","manual_review_task.created_at","manual_review_task.task_type"]
    alias: ["复核任务数","人工复核数","待复核任务数"]

  - name: 反洗钱案件数
    description: "统计指定时间段内新建的反洗钱案件总数。"
    relevant_columns: ["aml_case.id","aml_case.case_status","aml_case.opened_at","aml_case.case_type"]
    alias: ["AML案件数","反洗钱案件总数","洗钱案件数"]

  - name: 风控规则命中分布
    description: "按风控规则统计命中次数，用于分析命中最多的规则。"
    relevant_columns: ["risk_hit_record.rule_id","risk_hit_record.created_at","risk_rule.rule_name","risk_rule.rule_code"]
    alias: ["规则命中排名","风控规则触发分布","最多命中规则"]