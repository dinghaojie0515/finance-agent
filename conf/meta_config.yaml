tables:
  - name: dim_branch
    role: dim
    description: "银行机构维表，维护总行、分行、支行和营业网点。"
    columns:
      - name: id
        role: primary_key
        description: "机构主键ID。"
        alias: []
        sync: false
      - name: branch_code
        role: dimension
        description: "机构编码，业务唯一标识。"
        alias: ["机构代码","网点编码"]
        sync: true
      - name: branch_name
        role: dimension
        description: "机构名称，如某某分行、某某支行。"
        alias: ["机构名","网点名称","分行名称","支行名称"]
        sync: true
      - name: branch_level
        role: dimension
        description: "机构层级：head_office总行、branch分行、sub_branch支行、outlet营业网点。"
        alias: ["机构级别","层级"]
        sync: true
      - name: province
        role: dimension
        description: "机构所在省份。"
        alias: ["省份","省"]
        sync: true
      - name: city
        role: dimension
        description: "机构所在城市。"
        alias: ["城市","市"]
        sync: true
      - name: branch_status
        role: dimension
        description: "机构状态：active启用、suspended暂停、closed关闭。"
        alias: ["状态","机构状态"]
        sync: true

  - name: dim_channel
    role: dim
    description: "业务渠道维表，定义开户、交易、贷款、理财和服务请求来源渠道。"
    columns:
      - name: id
        role: primary_key
        description: "渠道主键ID。"
        alias: []
        sync: false
      - name: channel_code
        role: dimension
        description: "渠道编码，业务唯一标识。"
        alias: ["渠道代码"]
        sync: true
      - name: channel_name
        role: dimension
        description: "渠道名称，如手机银行、网上银行、柜面。"
        alias: ["渠道名","渠道"]
        sync: true
      - name: channel_type
        role: dimension
        description: "渠道类型：mobile_bank手机银行、online_bank网上银行、counter柜面、open_api开放银行、partner合作渠道。"
        alias: ["渠道类型"]
        sync: true
      - name: channel_status
        role: dimension
        description: "渠道状态：active启用、suspended暂停、offline下线。"
        alias: ["状态"]
        sync: false

  - name: dim_risk_level
    role: dim
    description: "风险等级维表，统一定义客户风险等级和产品风险等级。"
    columns:
      - name: id
        role: primary_key
        description: "风险等级主键ID。"
        alias: []
        sync: false
      - name: risk_level_code
        role: dimension
        description: "风险等级编码，如R1、R2、R3、R4、R5。"
        alias: ["风险等级代码"]
        sync: true
      - name: risk_level_name
        role: dimension
        description: "风险等级名称，如低风险、中低风险、中风险、中高风险、高风险。"
        alias: ["风险等级名","风险等级","等级名称"]
        sync: true
      - name: risk_level_type
        role: dimension
        description: "风险等级类型：customer客户风险、product产品风险。"
        alias: ["等级类型"]
        sync: true

  - name: dim_employee
    role: dim
    description: "员工主数据维表，定义员工编号、姓名、所属机构、岗位角色和在职状态。"
    columns:
      - name: id
        role: primary_key
        description: "员工主键ID。"
        alias: []
        sync: false
      - name: employee_no
        role: dimension
        description: "员工编号，业务唯一标识。"
        alias: ["工号","员工编号"]
        sync: false
      - name: employee_name
        role: dimension
        description: "员工姓名。"
        alias: ["姓名","员工名","催收员姓名"]
        sync: true
      - name: branch_id
        role: foreign_key
        description: "所属机构ID，关联dim_branch.id。"
        alias: ["机构ID","所属机构"]
        sync: false
      - name: employee_role
        role: dimension
        description: "岗位角色，如催收员、审批员、风控专员。"
        alias: ["岗位","角色","员工角色"]
        sync: true
      - name: employee_status
        role: dimension
        description: "在职状态：active在职、resigned离职、suspended停职。"
        alias: ["在职状态","状态"]
        sync: true

  - name: dim_currency
    role: dim
    description: "币种维表，定义账户余额、交易金额、贷款金额和理财金额使用的币种。"
    columns:
      - name: id
        role: primary_key
        description: "币种主键ID。"
        alias: []
        sync: false
      - name: currency_code
        role: dimension
        description: "币种编码，如CNY、USD。"
        alias: ["币种代码","货币代码"]
        sync: true
      - name: currency_name
        role: dimension
        description: "币种名称，如人民币、美元。"
        alias: ["币种名","货币名称"]
        sync: true
      - name: symbol
        role: dimension
        description: "币种符号，如¥、$。"
        alias: ["货币符号"]
        sync: false

  - name: account_product
    role: business
    description: "账户产品表，维护账户类型、开户条件、限额和账户费率。"
    columns:
      - name: id
        role: primary_key
        description: "账户产品主键ID。"
        alias: []
        sync: false
      - name: product_code
        role: dimension
        description: "账户产品编码。"
        alias: ["产品编码","账户产品代码"]
        sync: false
      - name: product_name
        role: dimension
        description: "账户产品名称。"
        alias: ["产品名称","账户产品名"]
        sync: true
      - name: account_type
        role: dimension
        description: "账户类型：savings储蓄、current活期、fixed_deposit定期等。"
        alias: ["账户类型","类型"]
        sync: true
      - name: product_status
        role: dimension
        description: "产品状态：active在售、suspended暂停、discontinued下架。"
        alias: ["产品状态","状态"]
        sync: true

  - name: service_product
    role: business
    description: "服务产品表，维护服务包、服务费用、适用渠道和服务状态。"
    columns:
      - name: id
        role: primary_key
        description: "服务产品主键ID。"
        alias: []
        sync: false
      - name: service_code
        role: dimension
        description: "服务产品编码。"
        alias: ["服务编码","服务代码"]
        sync: false
      - name: service_name
        role: dimension
        description: "服务产品名称。"
        alias: ["服务名称","服务名"]
        sync: true
      - name: service_type
        role: dimension
        description: "服务类型。"
        alias: ["服务类型","类型"]
        sync: true
      - name: service_status
        role: dimension
        description: "服务状态：active启用、suspended暂停、offline下线。"
        alias: ["服务状态","状态"]
        sync: true

  - name: customer
    role: business
    description: "客户主表，存储个人客户和企业客户的客户号、类型和生命周期状态。"
    columns:
      - name: id
        role: primary_key
        description: "客户主键ID。"
        alias: []
        sync: false
      - name: customer_no
        role: dimension
        description: "客户编号，业务唯一标识。"
        alias: ["客户号","用户编号"]
        sync: false
      - name: customer_type
        role: dimension
        description: "客户类型：personal个人客户、enterprise企业客户。"
        alias: ["客户类型","用户类型"]
        sync: true
      - name: customer_name
        role: dimension
        description: "客户名称，个人为姓名，企业为公司名称。"
        alias: ["客户名","用户名"]
        sync: false
      - name: branch_id
        role: foreign_key
        description: "开户所属机构ID，关联dim_branch.id。"
        alias: ["机构ID"]
        sync: false
      - name: register_channel_id
        role: foreign_key
        description: "注册渠道ID，关联dim_channel.id。"
        alias: ["注册渠道ID"]
        sync: false
      - name: risk_level_id
        role: foreign_key
        description: "客户风险等级ID，关联dim_risk_level.id。"
        alias: ["风险等级ID"]
        sync: false
      - name: customer_status
        role: dimension
        description: "客户状态：active活跃、inactive不活跃、frozen冻结、closed注销。"
        alias: ["客户状态","状态"]
        sync: true
      - name: opened_at
        role: dimension
        description: "客户开户时间。"
        alias: ["开户时间","注册时间","开户日期"]
        sync: false
      - name: created_at
        role: dimension
        description: "记录创建时间。"
        alias: ["创建时间"]
        sync: false

  - name: customer_kyc
    role: business
    description: "客户KYC信息表，记录KYC完成情况和审核状态。"
    columns:
      - name: id
        role: primary_key
        description: "KYC记录主键ID。"
        alias: []
        sync: false
      - name: customer_id
        role: foreign_key
        description: "客户ID，关联customer.id。"
        alias: ["客户ID"]
        sync: false
      - name: kyc_status
        role: dimension
        description: "KYC状态：pending待审核、approved已通过、rejected已拒绝、expired已过期。"
        alias: ["KYC状态","认证状态"]
        sync: true
      - name: reviewed_at
        role: dimension
        description: "KYC审核时间。"
        alias: ["审核时间"]
        sync: false
      - name: created_at
        role: dimension
        description: "记录创建时间。"
        alias: ["创建时间"]
        sync: false

  - name: enterprise_profile
    role: business
    description: "企业客户档案表，维护企业名称、统一社会信用代码、行业和经营状态。"
    columns:
      - name: id
        role: primary_key
        description: "企业档案主键ID。"
        alias: []
        sync: false
      - name: customer_id
        role: foreign_key
        description: "客户ID，关联customer.id。"
        alias: ["客户ID"]
        sync: false
      - name: company_name
        role: dimension
        description: "企业名称/公司名称。"
        alias: ["公司名","企业名"]
        sync: false
      - name: industry
        role: dimension
        description: "所属行业。"
        alias: ["行业","企业行业"]
        sync: true
      - name: business_status
        role: dimension
        description: "经营状态：operating正常经营、suspended停业、closed注销。"
        alias: ["经营状态","企业状态"]
        sync: true

  - name: bank_account
    role: business
    description: "银行账户表，维护账户余额、账户状态和开户信息。"
    columns:
      - name: id
        role: primary_key
        description: "账户主键ID。"
        alias: []
        sync: false
      - name: account_no
        role: dimension
        description: "账号，业务唯一标识。"
        alias: ["账号","账户编号"]
        sync: false
      - name: customer_id
        role: foreign_key
        description: "客户ID，关联customer.id。"
        alias: ["客户ID"]
        sync: false
      - name: branch_id
        role: foreign_key
        description: "开户机构ID，关联dim_branch.id。"
        alias: ["开户机构ID"]
        sync: false
      - name: currency_code
        role: dimension
        description: "账户币种。"
        alias: ["币种","货币"]
        sync: true
      - name: account_status
        role: dimension
        description: "账户状态：active正常、frozen冻结、dormant休眠、closed销户。"
        alias: ["账户状态","状态"]
        sync: true
      - name: available_amount
        role: measure
        description: "可用余额，单位元。"
        alias: ["可用余额","余额"]
        sync: false
      - name: balance_amount
        role: measure
        description: "账户总余额（含冻结），单位元。"
        alias: ["账户余额","总余额"]
        sync: false
      - name: frozen_amount
        role: measure
        description: "冻结金额，单位元。"
        alias: ["冻结金额","冻结额"]
        sync: false
      - name: opened_at
        role: dimension
        description: "账户开立时间。"
        alias: ["开户时间","开户日期","开立时间"]
        sync: false
      - name: created_at
        role: dimension
        description: "记录创建时间。"
        alias: ["创建时间"]
        sync: false

  - name: account_transaction
    role: business
    description: "账户交易流水表，记录转账、消费、充值、提现等资金交易明细。"
    columns:
      - name: id
        role: primary_key
        description: "交易流水主键ID。"
        alias: []
        sync: false
      - name: transaction_no
        role: dimension
        description: "交易流水号，业务唯一标识。"
        alias: ["流水号","交易编号"]
        sync: false
      - name: from_account_id
        role: foreign_key
        description: "付款账户ID，关联bank_account.id。"
        alias: ["付款账户ID","账户ID"]
        sync: false
      - name: customer_id
        role: foreign_key
        description: "客户ID，关联customer.id。"
        alias: ["客户ID"]
        sync: false
      - name: channel_id
        role: foreign_key
        description: "交易渠道ID，关联dim_channel.id。"
        alias: ["渠道ID"]
        sync: false
      - name: transaction_type
        role: dimension
        description: "交易类型：transfer转账、payment消费、deposit存款/充值、withdrawal提现、refund退款、reversal冲正。"
        alias: ["交易类型","交易种类"]
        sync: true
      - name: transaction_status
        role: dimension
        description: "交易状态：success成功、failed失败、pending处理中、reversed已冲正。"
        alias: ["交易状态","状态"]
        sync: true
      - name: transaction_amount
        role: measure
        description: "交易金额，单位元。"
        alias: ["交易金额","金额","成交金额"]
        sync: false
      - name: currency_code
        role: dimension
        description: "交易币种。"
        alias: ["币种"]
        sync: true
      - name: transaction_at
        role: dimension
        description: "交易发生时间。"
        alias: ["交易时间","交易日期","发生时间"]
        sync: false
      - name: created_at
        role: dimension
        description: "记录创建时间。"
        alias: ["创建时间"]
        sync: false

  - name: channel_transaction
    role: business
    description: "渠道交易表，记录各渠道发起的交易请求、渠道金额和对账状态。"
    columns:
      - name: id
        role: primary_key
        description: "渠道交易主键ID。"
        alias: []
        sync: false
      - name: channel_id
        role: foreign_key
        description: "渠道ID，关联dim_channel.id。"
        alias: ["渠道ID"]
        sync: false
      - name: transaction_id
        role: foreign_key
        description: "账户交易ID，关联account_transaction.id。"
        alias: ["交易ID","流水ID"]
        sync: false
      - name: request_status
        role: dimension
        description: "请求状态：success成功、failed失败、pending处理中。"
        alias: ["请求状态","渠道交易状态"]
        sync: true
      - name: channel_amount
        role: measure
        description: "渠道交易金额，单位元。"
        alias: ["渠道交易金额","渠道金额","渠道成交额"]
        sync: false
      - name: requested_at
        role: dimension
        description: "渠道请求时间。"
        alias: ["请求时间","渠道交易时间"]
        sync: false
      - name: created_at
        role: dimension
        description: "记录创建时间。"
        alias: ["创建时间"]
        sync: false

  - name: fund_freeze
    role: business
    description: "资金冻结表，维护账户资金冻结、解冻和释放记录。"
    columns:
      - name: id
        role: primary_key
        description: "冻结记录主键ID。"
        alias: []
        sync: false
      - name: account_id
        role: foreign_key
        description: "账户ID，关联bank_account.id。"
        alias: ["账户ID"]
        sync: false
      - name: customer_id
        role: foreign_key
        description: "客户ID，关联customer.id。"
        alias: ["客户ID"]
        sync: false
      - name: freeze_type
        role: dimension
        description: "冻结类型：judicial司法冻结、risk风控冻结、manual人工冻结。"
        alias: ["冻结类型","类型"]
        sync: true
      - name: freeze_amount
        role: measure
        description: "冻结金额，单位元。"
        alias: ["冻结金额","冻结额"]
        sync: false
      - name: freeze_status
        role: dimension
        description: "冻结状态：active冻结中、released已解冻、partial_released部分解冻。"
        alias: ["冻结状态","状态"]
        sync: true
      - name: frozen_at
        role: dimension
        description: "冻结时间。"
        alias: ["冻结时间","冻结日期"]
        sync: false

  - name: wealth_product
    role: business
    description: "理财产品表，维护理财产品基础信息、风险等级和预期收益。"
    columns:
      - name: id
        role: primary_key
        description: "理财产品主键ID。"
        alias: []
        sync: false
      - name: product_code
        role: dimension
        description: "理财产品编码，业务唯一标识。"
        alias: ["产品编码","产品代码"]
        sync: false
      - name: product_name
        role: dimension
        description: "理财产品名称。"
        alias: ["产品名称","理财产品名","产品名"]
        sync: true
      - name: risk_level_id
        role: foreign_key
        description: "产品风险等级ID，关联dim_risk_level.id。"
        alias: ["风险等级ID"]
        sync: false
      - name: product_type
        role: dimension
        description: "产品类型：fixed固定期限、flexible随时赎回、structured结构化。"
        alias: ["产品类型","类型"]
        sync: true
      - name: product_status
        role: dimension
        description: "产品状态：selling在售、closed已结束、suspended暂停销售。"
        alias: ["产品状态","状态"]
        sync: true
      - name: expected_yield_rate
        role: measure
        description: "预期年化收益率，百分比。"
        alias: ["预期收益率","年化收益率","收益率","预期年化收益率"]
        sync: false
      - name: min_purchase_amount
        role: measure
        description: "最低申购金额，单位元。"
        alias: ["最低申购额","起购金额"]
        sync: false

  - name: wealth_order
    role: business
    description: "理财订单表，记录理财申购和赎回订单明细。"
    columns:
      - name: id
        role: primary_key
        description: "订单主键ID。"
        alias: []
        sync: false
      - name: order_no
        role: dimension
        description: "订单编号，业务唯一标识。"
        alias: ["订单号"]
        sync: false
      - name: customer_id
        role: foreign_key
        description: "客户ID，关联customer.id。"
        alias: ["客户ID"]
        sync: false
      - name: product_id
        role: foreign_key
        description: "理财产品ID，关联wealth_product.id。"
        alias: ["产品ID"]
        sync: false
      - name: order_type
        role: dimension
        description: "订单类型：purchase申购、redemption赎回。"
        alias: ["订单类型","类型"]
        sync: true
      - name: order_status
        role: dimension
        description: "订单状态：pending待确认、confirmed已确认、cancelled已取消、failed失败。"
        alias: ["订单状态","状态"]
        sync: true
      - name: order_amount
        role: measure
        description: "订单金额，单位元。"
        alias: ["订单金额","金额","申购金额","赎回金额"]
        sync: false
      - name: submitted_at
        role: dimension
        description: "订单提交时间。"
        alias: ["下单时间","申购时间","赎回时间","订单时间","提交时间"]
        sync: false
      - name: created_at
        role: dimension
        description: "记录创建时间。"
        alias: ["创建时间"]
        sync: false

  - name: wealth_position
    role: business
    description: "理财持仓表，记录客户当前持仓份额、成本和市值。"
    columns:
      - name: id
        role: primary_key
        description: "持仓主键ID。"
        alias: []
        sync: false
      - name: customer_id
        role: foreign_key
        description: "客户ID，关联customer.id。"
        alias: ["客户ID"]
        sync: false
      - name: product_id
        role: foreign_key
        description: "理财产品ID，关联wealth_product.id。"
        alias: ["产品ID"]
        sync: false
      - name: position_status
        role: dimension
        description: "持仓状态：holding持有中、redeemed已赎回。"
        alias: ["持仓状态","状态"]
        sync: true
      - name: holding_share
        role: measure
        description: "持有份额。"
        alias: ["持有份额","份额"]
        sync: false
      - name: market_value_amount
        role: measure
        description: "持仓市值，单位元。"
        alias: ["持仓市值","持仓金额","持仓规模","AUM"]
        sync: false
      - name: cost_amount
        role: measure
        description: "持仓成本，单位元。"
        alias: ["持仓成本","成本"]
        sync: false
      - name: created_at
        role: dimension
        description: "建仓时间。"
