  - name: collection_performance_daily
    role: business
    description: "催收绩效日统计表，按催收人员每日汇总催收案件数和回收金额。"
    columns:
      - name: id
        role: primary_key
        description: "绩效记录主键ID。"
        alias: []
        sync: false
      - name: collector_id
        role: foreign_key
        description: "催收员工ID，关联dim_employee.id。"
        alias: ["催收员ID"]
        sync: false
      - name: stat_date
        role: dimension
        description: "统计日期。"
        alias: ["统计日期","日期"]
        sync: false
      - name: assigned_case_count
        role: measure
        description: "当日分配案件数。"
        alias: ["案件数","分配案件数","处理案件数"]
        sync: false
      - name: active_case_count
        role: measure
